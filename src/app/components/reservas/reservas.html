<div class="container">
  <div class="info-side">
    <h2>Visítanos</h2>
    <p>Disfruta de la auténtica experiencia italiana en el corazón de la ciudad.</p>
    <p><i class="fas fa-location-dot"></i> Calle de la Pasta 123, Roma</p>
    <p><i class="fas fa-phone"></i> +57 300 123 4567</p>
    <p><i class="fas fa-clock"></i> Mar - Dom: 12:00 PM - 10:00 PM</p>
    
    <div style="margin-top: 30px;">
      <img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=400" alt="Restaurante" style="width: 100%; border-radius: 15px;">
    </div>
  </div>

  <div class="form-side">
    <h2>Reserva tu mesa</h2>
    <form (ngSubmit)="confirmarReserva()">
      <div class="form-group">
        <label>Nombre Completo</label>
        <input type="text" name="nombre" [(ngModel)]="reserva.nombre" placeholder="Ej. Juan Pérez" required>
      </div>

      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" name="email" [(ngModel)]="reserva.email" placeholder="juan@correo.com" required>
      </div>

      <div class="form-group">
        <label>Fecha de la Reserva</label>
        <input type="date" name="fecha" [(ngModel)]="reserva.fecha" required>
      </div>

      <div class="form-group">
        <label>Número de Personas</label>
        <select name="personas" [(ngModel)]="reserva.personas" required>
          <option value="">Seleccione...</option>
          <option value="1">1 Persona</option>
          <option value="2">2 Personas</option>
          <option value="3">3 Personas</option>
          <option value="4">4 Personas</option>
          <option value="5+">Más de 4 (Grupo)</option>
        </select>
      </div>

      <button type="submit">Confirmar Reserva</button>
    </form>
  </div>
</div>

  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background-color: #f5d08a;
    }

    /* NAVBAR */
    header {
        background-color: #e6b866;
        display: flex;
        justify-content: center;
        gap: 60px;
        padding: 15px;
        font-weight: bold;
    }

    header a {
        text-decoration: none;
        color: #d97706;
        font-size: 18px;
    }

    /* HERO */
    .hero {
        position: relative;
        height: 90vh;
        background: url('https://images.unsplash.com/photo-1608756687911-aa1599ab3bd9') center/cover no-repeat;
        display: flex;
        align-items: center;
        padding-left: 60px;
    }

    .hero h1 {
        font-size: 60px;
        color: black;
        text-shadow: 2px 2px 0 white;
    }

    .hero h1 span {
        display: block;
    }

    /* SIDEBAR SOCIAL */
    .social {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        gap: 15px;
        font-size: 24px;
        color: #d97706;
    }

    /* BOTÓN RESERVA LATERAL */
    .reserva {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%) rotate(-90deg);
        background-color: #e6b866;
        padding: 10px 20px;
        font-weight: bold;
        color: #d97706;
    }

</style>
